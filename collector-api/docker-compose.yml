services:
  web:
    build: .
    container_name: collector-api-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Estos valores se pueden sobreescribir desde .env
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
    ports:
      - "${APP_PORT:-5000}:${APP_PORT:-5000}"
    volumes:
      - ./:/app:rw
    # Use APP_PORT from .env to bind gunicorn to the configured port
    command: ["sh", "-c", "gunicorn -w 4 -b 0.0.0.0:${APP_PORT:-5000} main:app"]

