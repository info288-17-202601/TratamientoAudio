<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Endpoint</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <button id="btn-fetch">Obtener Audios</button>

    <script>
        document.getElementById('btn-fetch').addEventListener('click', () => {
            console.log('Haciendo la petición...');
            
            fetch('http://127.0.0.1:4001/api/audios')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json(); // Cambia a .text() si el endpoint no devuelve JSON
                })
                .then(data => {
                    console.log('Respuesta recibida:', data);
                })
                .catch(error => {
                    console.error('Hubo un error con la petición:', error);
                });
        });
    </script>

</body>
</html>
