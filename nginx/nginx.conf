events {}

http {
  upstream public_frontend {
    server public-frontend:80;
  }

  upstream collector_frontend {
    server collector-frontend:80;
  }

  # Load balancer para las APIs:
  # El DNS interno de Docker resuelve el nombre del servicio a las IPs de
  # todas sus replicas; nginx las registra como peers del upstream.
  # least_conn: cada request va a la instancia con menos conexiones activas.
  # max_fails/fail_timeout: si una replica falla 3 veces, se saca de la
  # rotacion por 15s y el trafico sigue hacia las demas.
  upstream root_backend {
    least_conn;
    server root-backend:4001 max_fails=3 fail_timeout=15s;
  }

  upstream collector_api {
    least_conn;
    server collector-api:4000 max_fails=3 fail_timeout=15s;
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    client_max_body_size 100m;

    location /api/ {
      proxy_pass http://root_backend/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Si una replica no responde, reintenta en la siguiente
      proxy_next_upstream error timeout http_502 http_503;
      proxy_next_upstream_tries 3;
    }

    location /collector-api/ {
      proxy_pass http://collector_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_next_upstream error timeout http_502 http_503;
      proxy_next_upstream_tries 3;
    }

    location = /collector {
      return 301 /collector/;
    }

    location /collector/ {
      proxy_pass http://collector_frontend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://public_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
