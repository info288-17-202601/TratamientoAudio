<div class="flex h-screen w-full min-h-0 overflow-hidden bg-slate-50 p-4 gap-4">

  <aside class="flex-1 min-w-[260px] max-w-[340px] bg-white border border-slate-200/90 rounded-2xl flex flex-col justify-between shadow-xl z-10 h-full overflow-hidden">

    <div class="card-header shrink-0 flex items-center justify-between w-full box-border p-[24px_28px]">
      <div class="flex items-center gap-4 min-w-0 flex-1">
        <div class="logo-box shrink-0">🎧</div>
        <div class="min-w-0">
          <h1 class="truncate m-0 text-xl font-[850] text-[#111e4d] tracking-tight">Sound Colab</h1>
          <p class="truncate m-0 mt-0.5 text-xs font-semibold text-[#3b4b72]/90">Visualizador de ruido 🐦</p>
        </div>
      </div>
      <div class="equalizer-animation shrink-0 ml-4"></div>
    </div>

    <div class="p-6 space-y-6 overflow-y-auto flex-1 flex flex-col justify-start min-h-0">
      <div>
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Capas de Visualización</h2>

        <label class="flex items-center justify-between p-4 bg-slate-50 hover:bg-[#fbf6ff] rounded-2xl cursor-pointer transition-all duration-200 border border-slate-200 hover:border-[#b88be0] hover:shadow-sm group">
          <div class="flex items-center space-x-3 min-w-0">
            <span class="text-xl group-hover:scale-110 transition-transform flex-shrink-0">🔥</span>
            <span class="text-sm font-semibold text-[#111e4d] truncate">Mapa de calor (Ruido)</span>
          </div>
          <input
            type="checkbox"
            [checked]="mostrarMapaRuido()"
            (change)="toggleMapaRuido()"
            class="w-4 h-4 text-[#8d61bd] border-slate-300 rounded focus:ring-[#8d61bd] cursor-pointer flex-shrink-0">
        </label>
      </div>

      <div class="pt-4 border-t border-slate-100 space-y-3">
        <div class="user-block">
          <p class="text-xs text-slate-400 uppercase tracking-wider font-bold m-0">Sesion activa</p>
          <p class="text-sm font-semibold text-[#111e4d] truncate m-0" [title]="currentUser()?.email || ''">
            {{ displayName() }}
          </p>
          @if (currentUser()?.email) {
            <p class="text-xs text-slate-500 truncate m-0">{{ currentUser()?.email }}</p>
          }
          @if (roleLabel()) {
            <span class="role-badge">{{ roleLabel() }}</span>
          }
        </div>

        <button type="button" class="logout-button" (click)="logout()" aria-label="Cerrar sesion">
          <span aria-hidden="true">↩</span>
          Cerrar sesion
        </button>
      </div>

      <div class="pt-2 border-t border-slate-100">
        <p class="text-xs text-slate-400 italic leading-relaxed">Los datos se actualizan de manera asíncrona desde el servidor central.</p>
      </div>
    </div>

    <div class="text-xl font-black text-slate-200 tracking-tight select-none p-6 bg-slate-50/50 border-t border-slate-100 shrink-0">
      UACh Inf
    </div>
  </aside>

  <main class="flex-[3] min-w-0 h-full w-full overflow-hidden">
    <div class="w-full h-full bg-white rounded-2xl shadow-xl border border-slate-200/80 overflow-hidden relative flex flex-col">
      <app-noise-map [capaActiva]="mostrarMapaRuido()" class="w-full h-full block flex-1"></app-noise-map>
    </div>
  </main>

</div>
