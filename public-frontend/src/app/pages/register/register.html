<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎧</div>
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Registrate para acceder a Sound Colab</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
      <label class="auth-field">
        <span>Nombre completo</span>
        <input
          type="text"
          formControlName="name"
          autocomplete="name"
          placeholder="Tu nombre"
          [class.input-error]="form.get('name')?.invalid && form.get('name')?.touched"
        />
      </label>

      <label class="auth-field">
        <span>Username</span>
        <input
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="ej: juanperez"
          [class.input-error]="form.get('username')?.invalid && form.get('username')?.touched"
        />
      </label>

      <label class="auth-field">
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@email.com"
          [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
      </label>

      <label class="auth-field">
        <span>Contrasena</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="Minimo 6 caracteres"
          [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
        />
      </label>

      <label class="auth-field">
        <span>Rol</span>
        <select formControlName="role">
          <option value="user">Usuario</option>
          <option value="admin">Administrador</option>
        </select>
      </label>

      @if (errorMessage()) {
        <div class="auth-error" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="auth-button" [disabled]="loading()">
        @if (loading()) {
          <span class="auth-spinner"></span>
          Creando cuenta...
        } @else {
          Registrarme
        }
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesion</a>
    </p>
  </div>
</div>
