<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎧</div>
      <h1 class="auth-title">Sound Colab</h1>
      <p class="auth-subtitle">Inicia sesion para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
      <label class="auth-field">
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@email.com"
          [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
      </label>

      <label class="auth-field">
        <span>Contrasena</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="******"
          [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
        />
      </label>

      @if (errorMessage()) {
        <div class="auth-error" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="auth-button" [disabled]="loading()">
        @if (loading()) {
          <span class="auth-spinner"></span>
          Ingresando...
        } @else {
          Iniciar sesion
        }
      </button>
    </form>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/register">Registrate aqui</a>
    </p>
  </div>
</div>
