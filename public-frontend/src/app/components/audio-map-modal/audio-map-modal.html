<div class="backdrop" (click)="close()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-header-info">
        <span class="modal-db">{{ audio.decibels | number:'1.1-1' }} <small>dB</small></span>
        <div class="modal-tags">
          <span class="modal-cat">{{ audio.categoria }}</span>
          @if (audio.tipo_ave) {
            <span class="modal-bird">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7h.01"/><path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/><path d="m20 7 2 .5-2 .5"/><path d="M10 18v3"/><path d="M14 17.75V21"/><path d="M7 18a6 6 0 0 0 3.84-10.61"/></svg>
              {{ audio.tipo_ave }}
            </span>
          }
        </div>
        <p class="modal-coords">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          {{ audio.latitud | number:'1.5-5' }}, {{ audio.longitud | number:'1.5-5' }}
        </p>
      </div>
      <button class="close-btn" (click)="close()" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="map-wrap" #mapContainer></div>

  </div>
</div>
